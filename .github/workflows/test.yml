name: Edge Functions CI

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    name: Run Deno Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run Test Suite
        run: deno test supabase/functions/
